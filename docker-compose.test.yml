services:
  source-db:
    image: postgres:17-alpine
    container_name: pg_dbmigrator_source
    environment:
      POSTGRES_USER: migrator
      POSTGRES_PASSWORD: migrator
      POSTGRES_DB: appdb
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=8
      -c max_wal_senders=8
      -c shared_buffers=128MB
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrator -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30

  target-db:
    image: postgres:17-alpine
    container_name: pg_dbmigrator_target
    environment:
      POSTGRES_USER: migrator
      POSTGRES_PASSWORD: migrator
      POSTGRES_DB: appdb
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrator -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30
