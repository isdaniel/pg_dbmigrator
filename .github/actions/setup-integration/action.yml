name: Setup Integration Test Environment
description: Install PostgreSQL 17 client tools and start Docker Compose test stack

runs:
  using: composite
  steps:
    - name: Install PostgreSQL 17 client tools
      shell: bash
      run: |
        sudo install -d /usr/share/postgresql-common/pgdg
        sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
          https://www.postgresql.org/media/keys/ACCC4CF8.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
          | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-client-17

    - name: Prepend PostgreSQL 17 client to PATH
      shell: bash
      run: |
        echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
        /usr/lib/postgresql/17/bin/pg_dump --version
        /usr/lib/postgresql/17/bin/pg_restore --version

    - name: Clean up stale containers and free ports
      shell: bash
      run: |
        docker compose -f docker-compose.test.yml down -v 2>/dev/null || true
        docker rm -f pg_dbmigrator_source pg_dbmigrator_target 2>/dev/null || true
        sudo systemctl stop postgresql 2>/dev/null || true

    - name: Start docker-compose stack
      shell: bash
      run: docker compose -f docker-compose.test.yml up -d --wait --force-recreate
