name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-unit-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets --locked

      - name: cargo test (unit + doc)
        run: cargo test --workspace --locked

  integration-offline:
    name: Integration test (offline mode, end-to-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run offline e2e
        run: bash tests/integration/run_offline.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online:
    name: Integration test (online mode, two-CaughtUp + cutover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online e2e
        run: bash tests/integration/run_online.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-updates:
    name: Integration test (online, UPDATE/DELETE/INSERT during dump+restore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online updates e2e
        run: bash tests/integration/run_online_updates.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-sustained:
    name: Integration test (online, 60s sustained mutations + pre-cutover equality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online sustained e2e
        env:
          SUSTAIN_SECS: "60"
        run: bash tests/integration/run_online_sustained.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-offline-split-sections:
    name: Integration test (offline, pre-data → data → post-data section orchestration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run offline split-sections e2e
        run: bash tests/integration/run_offline_split_sections.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-offline-resume:
    name: Integration test (offline, resume token skips dump+restore on second run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run offline resume e2e
        run: bash tests/integration/run_offline_resume.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-offline-sigint-cancel:
    name: Integration test (offline, SIGINT mid-pg_dump → fast cancellation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run offline SIGINT cancel e2e
        run: bash tests/integration/run_offline_sigint_cancel.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-lag-cadence:
    name: Integration test (online, adaptive lag-poll cadence near catch-up)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online lag cadence e2e
        run: bash tests/integration/run_online_lag_cadence.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-cancel-resume:
    name: Integration test (online, cancel mid-apply + resume)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online cancel+resume e2e
        run: bash tests/integration/run_online_cancel_resume.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-multi-resume-sustained:
    name: Integration test (online, multi-resume + 30s sustained mutations + cutover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online multi-resume sustained e2e
        env:
          SUSTAIN_SECS: "30"
        run: bash tests/integration/run_online_multi_resume_sustained.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online-sequence-sync:
    name: Integration test (online, sequence sync at cutover — no post-cutover PK collision)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-integration

      - name: Run online sequence-sync e2e
        run: bash tests/integration/run_online_sequence_sync.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-unit-test
      - integration-offline
      - integration-online
      - integration-online-updates
      - integration-online-sustained
      - integration-offline-split-sections
      - integration-offline-resume
      - integration-offline-sigint-cancel
      - integration-online-lag-cadence
      - integration-online-cancel-resume
      - integration-online-multi-resume-sustained
      - integration-online-sequence-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Publish pg_dbmigrator (library)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p pg_dbmigrator --locked

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish pg_dbmigrator-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p pg_dbmigrator-cli --locked
