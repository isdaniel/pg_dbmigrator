name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-unit-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets --locked

      - name: cargo test (unit + doc)
        run: cargo test --workspace --locked

  integration-offline:
    name: Integration test (offline mode, end-to-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL 17 client tools (pg_dump / pg_restore / psql)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Start docker-compose stack
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run offline e2e (offline_migration_example binary)
        run: bash tests/integration/run_offline.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down docker-compose stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-online:
    name: Integration test (online mode, two-CaughtUp + cutover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL 17 client tools (pg_dump / pg_restore / psql)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Start docker-compose stack
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run online e2e (online_migration_example binary, two CaughtUps + SIGINT cutover)
        run: bash tests/integration/run_online.sh

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down docker-compose stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
