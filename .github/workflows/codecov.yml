name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always
  PG_SOURCE_URL: "postgresql://migrator:migrator@localhost:55432/appdb"
  PG_TARGET_URL: "postgresql://migrator:migrator@localhost:55433/appdb"
  PG_SUBSCRIPTION_SOURCE_URL: "postgresql://migrator:migrator@source-db:5432/appdb"

jobs:
  coverage:
    name: Generate coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: ./.github/actions/setup-integration

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
